<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>사회복무요원 업무 로테이션</title>
</head>
<body>
  <h1>이번 주 업무 담당</h1>

  <ul id="result"></ul>

  <script>
    // 👤 사회복무요원 이름
    const members = ["조민승", "권한진", "박준성", "이영민"];

    // 🗂 업무 목록
    const tasks = ["식사배달", "오전셔틀", "오후셔틀", "파크골프"];

    // 📅 기준 날짜 (권한진-박준성-이영민-조민승 순서로 시작하는 날짜)
    const startDate = new Date("2026-02-02");
    const today = new Date();

    const weekDiff = Math.floor(
      (today - startDate) / (1000 * 60 * 60 * 24 * 7)
    );

    const rotation = weekDiff % members.length;

    const rotatedMembers = members
      .slice(members.length - rotation)
      .concat(members.slice(0, members.length - rotation));

    const resultEl = document.getElementById("result");

    tasks.forEach((task, i) => {
      const member = rotatedMembers[i];

      const li = document.createElement("li");
      li.textContent = `${task} : ${member}`;
      resultEl.appendChild(li);
    });
  </script>
</body>
</html>
