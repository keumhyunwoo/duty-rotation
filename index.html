<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>사회복무요원 업무 로테이션</title>
</head>
<body>
  <h1>이번 주 업무 담당</h1>

  <ul id="result"></ul>

  <script>
    // 👤 사회복무요원 이름
    const members = ["권한진", "박준성", "이영민", "조민승"];

    // 🗂 업무 목록
    const tasks = ["식사배달", "오전셔틀", "오후셔틀", "파크골프"];

    // 📅 기준 날짜 (과거 날짜)
    const startDate = new Date("2026-02-02");
    const today = new Date();

    const weekDiff = Math.floor(
      (today - startDate) / (1000 * 60 * 60 * 24 * 7)
    );

    const resultEl = document.getElementById("result");

    tasks.forEach((task, i) => {
      const member = members[(i + weekDiff) % members.length];
      const li = document.createElement("li");
      li.textContent = `${task} : ${member}`;
      resultEl.appendChild(li);
    });
  </script>
</body>
</html>
